<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <rect x="40" y="40" width="1520" height="920" rx="28" fill="#ffffff" stroke="#dbe3f0" stroke-width="2"/>

  <text x="800" y="100" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#1e293b">CRUD Flow for SmartLink AI</text>
  <text x="800" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#64748b">Create, Read, Update, Delete, and the possible link outcomes</text>

  <rect x="110" y="190" width="220" height="90" rx="22" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="220" y="245" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">User</text>

  <rect x="380" y="190" width="190" height="90" rx="22" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="475" y="245" text-anchor="middle" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f766e">Create</text>

  <rect x="610" y="190" width="180" height="90" rx="22" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="245" text-anchor="middle" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#15803d">Read</text>

  <rect x="830" y="190" width="190" height="90" rx="22" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="925" y="245" text-anchor="middle" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b45309">Update</text>

  <rect x="1060" y="190" width="180" height="90" rx="22" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="1150" y="245" text-anchor="middle" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b91c1c">Delete</text>

  <line x1="330" y1="235" x2="380" y2="235" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="235" x2="610" y2="235" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="790" y1="235" x2="830" y2="235" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1020" y1="235" x2="1060" y2="235" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="300" y="360" width="260" height="95" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="430" y="410" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Validate URL & Alias</text>

  <rect x="610" y="360" width="260" height="95" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="740" y="410" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Store Link Record</text>

  <rect x="920" y="360" width="270" height="95" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1055" y="410" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Modify Alias / Target / Expiry</text>

  <line x1="475" y1="280" x2="475" y2="360" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="408" x2="610" y2="408" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="870" y1="408" x2="920" y2="408" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="240" y="530" width="250" height="95" rx="20" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="365" y="580" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Generate QR Code</text>

  <rect x="540" y="530" width="250" height="95" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="665" y="580" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1d4ed8">Track Click Analytics</text>

  <rect x="840" y="530" width="250" height="95" rx="20" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="965" y="580" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#a16207">Refresh Metadata</text>

  <line x1="740" y1="455" x2="740" y2="530" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="540" y1="578" x2="490" y2="578" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="840" y1="578" x2="790" y2="578" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="430" y="710" width="240" height="95" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="550" y="760" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#334155">Active Link</text>

  <rect x="720" y="710" width="240" height="95" rx="20" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="840" y="760" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#b91c1c">Expired Link</text>

  <rect x="1010" y="710" width="260" height="95" rx="20" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="1140" y="760" text-anchor="middle" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9a2c00">Broken / Invalid Link</text>

  <line x1="365" y1="625" x2="430" y2="710" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="665" y1="625" x2="720" y2="710" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="965" y1="625" x2="1010" y2="710" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="180" y="840" width="340" height="80" rx="20" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="350" y="887" text-anchor="middle" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#4338ca">Dashboard / Public Stats</text>

  <line x1="650" y1="760" x2="520" y2="840" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>